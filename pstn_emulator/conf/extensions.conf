; Answer 50% - Busy 50%
[ans_busy]
exten => s,1,NoOp(answer_busy_50_50)
same => n,Set(CALL_COUNT=${DB(dialplan/call_count_1)})
same => n,GotoIf($["${CALL_COUNT}" = ""]?init_counter:check_counter)
; Inicializar el contador si no existe
same => n(init_counter),NoOp(Initializing call counter)
same => n,Set(DB(dialplan/call_count_1)=1)
same => n,Set(CALL_COUNT=${DB(dialplan/call_count_1)})
same => n,Goto(check_counter)
; Evaluar el caso basado en el contador
same => n(check_counter),NoOp(Check playback based on counter)
same => n,Set(CALL_TYPE=$[${CALL_COUNT} % 2])
same => n,GotoIf($[${CALL_TYPE} = 0]?beep:weasels)
; Caso 1: Responder (Answer)
same => n(beep),NoOp(Case: Answer)
same => n,Set(DB(dialplan/call_count_1)=$[${CALL_COUNT} + 1])
same => n,Gosub(playmusic,s,15_sec)
same => n,Hangup()
; Caso 2: Ocupado (Busy)
same => n(weasels),NoOp(Case: Busy)
same => n,Set(DB(dialplan/call_count_1)=$[${CALL_COUNT} + 1])
same => n,Busy(5)
same => n,Hangup()

; Answer 25% - Busy 25% - Congestion 25% - No Answer 25%
[answer_busy_congestion_noanswer_shortcall_cancel]
exten => s,1,NoOp(answer_busy_congestion_noans - 25% 25% 25% 25%)
same => n,Set(CALL_COUNT=${DB(dialplan/call_count_2)})
same => n,GotoIf($["${CALL_COUNT}" = ""]?init_counter:check_counter)
; Inicializar el contador si no existe
same => n(init_counter),Verbose(2, Initializing call counter)
same => n,Set(DB(dialplan/call_count_2)=1)
same => n,Set(CALL_COUNT=${DB(dialplan/call_count_2)})
same => n,Goto(check_counter)
; Evaluar el caso basado en el contador
same => n(check_counter),Verbose(2, Checking case based on counter)
same => n,Set(CALL_TYPE=$[${CALL_COUNT} % 4])
same => n,Set(DB(dialplan/call_count_2)=$[${CALL_COUNT} + 1])
; Dividir en los cuatro casos
same => n,GotoIf($[${CALL_TYPE} = 0]?answer_case)
same => n,GotoIf($[${CALL_TYPE} = 1]?busy_case)
same => n,GotoIf($[${CALL_TYPE} = 2]?congestion_case)
same => n,Goto(noanswer_case)
; Caso 1: Responder (Answer)
same => n(answer_case),Verbose(2, Case: Answer)
same => n,Gosub(playmusic,s,15_sec)
same => n,Hangup()
; Caso 2: Ocupado (Busy)
same => n(busy_case),Verbose(2, Case: Busy)
same => n,Busy(5)
same => n,Hangup()
; Caso 3: Congestión (Congestion)
same => n(congestion_case),Verbose(2, Case: Congestion)
same => n,Congestion(5)
same => n,Hangup()
; Caso 4: Sin Respuesta (No Answer)
same => n(noanswer_case),Verbose(2, Case: No Answer)
same => n,Wait(90)
same => n,Hangup()

; Voicebot 50% - Short Call 50% - Long Call 50%
[transfer_sip_refer]
exten => s,1,NoOp(voicebot_50_50)
same => n,Set(oml_telnum=${CALLERID(NUM)})
same => n,Set(oml_campid=${PJSIP_HEADER(read,X-Verloop-CampID)})
same => n,Set(oml_contactid=${PJSIP_HEADER(read,X-Verloop-CustomerID)})
same => n,Set(oml_uniqueid=${PJSIP_HEADER(read,X-Verloop-CallID)})
same => n,Set(CHANNEL(hangup_handler_push)=rip-transfer-sip-refer,s,1)
same => n,NoOp(X-OML-Verloop-CampID: ${PJSIP_HEADER(read,X-OML-Verloop-CampID)})
same => n,NoOp(X-OML-Verloop-CustomerID: ${PJSIP_HEADER(read,X-OML-Verloop-CustomerID)})   
same => n,NoOp(X-OML-Verloop-CallID: ${PJSIP_HEADER(read,X-OML-Verloop-CallID)})
same => n,Set(CALL_COUNT=${DB(dialplan/call_count_voicebot)})
same => n,GotoIf($["${CALL_COUNT}" = ""]?init_counter:check_counter)
; Inicializar el contador si no existe
same => n(init_counter),NoOp(Initializing voicebot call counter)
same => n,Set(DB(dialplan/call_count_voicebot)=1)
same => n,Set(CALL_COUNT=${DB(dialplan/call_count_voicebot)})
same => n,Goto(check_counter)
; Evaluar el caso basado en el contador
same => n(check_counter),NoOp(Check voicebot mode based on counter)
same => n,Set(CALL_TYPE=$[${CALL_COUNT} % 2])
same => n,GotoIf($[${CALL_TYPE} = 0]?call_voicebot_short_call:call_voicebot_long_call)
; Caso 1: Short Call (50%)
same => n(call_voicebot_short_call),NoOp(Case: Short Call)
same => n,Set(DB(dialplan/call_count_voicebot)=$[${CALL_COUNT} + 1])
same => n,Answer()
same => n,Set(outcome=False)
same => n,Playback(oml_agent_ofrece_turno)
same => n,Playback(silence/2)
same => n,Wait(2)
same => n,Hangup()
; Caso 2: Long Call (50%)
same => n(call_voicebot_long_call),NoOp(Case: Long Call)
same => n,Set(DB(dialplan/call_count_voicebot)=$[${CALL_COUNT} + 1])
same => n,Answer()
same => n,Playback(oml_moh_02_15_sec)
same => n,Set(outcome=True)
same => n(transfer),Transfer(PJSIP/sip:12345@acd-server:5060)
same => n,Hangup()

[transfer_oml_api]
